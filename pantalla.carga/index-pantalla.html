<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantalla de Carga</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Lexend+Deca:wght@100..900&family=Metal+Mania&family=New+Rocker&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Ruslan+Display&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .top-bar {
      width: 100%;
      height: 100px;
      background-color: #ffd829;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      box-sizing: border-box;
    }

    .top-bar .iconos {
      display: flex;
      gap: 40px;
      justify-content: flex-start;
      flex: 1;
    }

    .top-bar .iconos .icon {
      text-decoration: none;
      font-size: 24px;
      color: #000;
    }

    .top-bar .logo img {
      height: 80px;
      width: auto;
    }

    .cuadro {
      position: relative;
      width: 1200px;
      height: 750px;
      margin-top: 20px;
      border-radius: 10px;
      border: 0px solid #ffd829;
      overflow: hidden;
      background-image: url('../images/parking.png');
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .cuadro::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
      z-index: 0;
    }

    .texto {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .texto h1 {
      font-size: 80px;
      margin: 0;
      color: #ffffff;
      font-family: Metal Mania;
    }

    .texto h2 {
      font-size: 50px;
      margin: 10px 0;
      color: white;
      font-family: Metal Mania;
    }

    .texto a p {
      font-size: 35px;
      margin: 10px 0;
      color: #ffd829;
      cursor: pointer;
      transition: transform 0.2s;
      font-family: Metal Mania;
    }

    .texto a p:hover {
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <!-- Barra superior -->
  <header class="top-bar">
    <div class="iconos">
      <a href="index-pantalla.html" class="icon">Inicio</a>
      <a href="../info/index-info.html" class="icon">Informacion</a>
    </div>
    <div class="logo">
      <img src="../images/logo-racc.jpg" alt="Logo" id="logo-placeholder">
    </div>
  </header>

  <!-- Contenedor estilo juego -->
  <div class="cuadro">
    <div class="texto">
      <h1>El Arte de no Chocar</h1>
      <h2>Modo de Juego</h2>
      <a href="../index.html"><p>Libre</p></a>
      <a href="../modo-random/index-random.html"><p>Auténtico Reto</p></a>
    </div>
  </div>
</body>
</html>
