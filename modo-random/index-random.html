<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slideshow con Interior de Coche</title>
  <link rel="stylesheet" href="random.css">
</head>
<body>

  <!-- Barra superior -->
  <header class="top-bar">
    <div class="iconos">
      <a href="../pantalla.carga/index-pantalla.html" class="icon">Inicio</a>
      <a href="../info/index-info.html" class="icon">Informacion</a>
    </div>
    
    <div class="logo">
      <img src="../images/logo-racc.jpg" alt="Logo" id="logo-placeholder">
    </div>
  </header>

  <!-- Contenedor principal -->
  <div class="main-container">
    <!-- Panel izquierdo con indicadores -->
    <div class="panel-cuadrados">
      <div class="cuadro" id="cuadro1"><img src="../images/cerbeza.png" alt=""></div>
      <div class="cuadro" id="cuadro2"><img src="../images/Puro.png" alt=""></div>
      <div class="cuadro" id="cuadro3"><img src="../images/ZZZ.png" alt=""></div>
      <div class="cuadro" id="cuadro4"><p>📞</p></div>
    </div>

    <!-- Contenedor del fondo y coche -->
    <div class="carretera-container" id="contenedor">
      <div class="carretera">
        <img src="../images/1.png" alt="Bosque">
        <img src="../images/2.png" alt="Carretera">
        <img src="../images/3.png" alt="">
        <img src="../images/4.png" alt="">
      </div>

      <!-- Capa de humo -->
      <div class="capa-humo"></div>

      <!-- Coche overlay -->
      <img src="../images/coche.png" alt="Interior del coche" class="interior">
    </div>
  </div>

  <script src="java-rondom.js"></script>
</body>
</html>
